<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Reading Room — PDF Research Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="room">

  <!-- LEFT: the shelf -->
  <aside class="shelf">
    <div class="shelf-header">
      <span class="mark">§</span>
      <h1>The Reading Room</h1>
    </div>
    <p class="shelf-sub">Bring a document. Ask it anything.</p>

    <div class="upload-card" id="uploadCard">
      <input type="file" id="fileInput" accept="application/pdf" hidden />
      <label for="fileInput" class="upload-drop" id="uploadDrop">
        <span class="upload-glyph">＋</span>
        <span class="upload-label">Place a PDF on the desk</span>
        <span class="upload-hint">click to browse</span>
      </label>
    </div>

    <div class="volume-status" id="volumeStatus">
      <div class="status-row">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">No volume open</span>
      </div>
      <div class="volume-meta" id="volumeMeta"></div>
    </div>

    <button class="ghost-btn" id="clearPdfBtn">Close this volume</button>
    <button class="ghost-btn" id="clearChatBtn">Clear conversation</button>
  </aside>

  <!-- CENTER: the manuscript / chat -->
  <main class="manuscript">
    <div class="page-scroll" id="chatLog">
      <div class="empty-page" id="emptyState">
        <p class="empty-quote">"Every book is a conversation, waiting to be started."</p>
        <p class="empty-instruction">Upload a PDF on the left, then ask your first question below.</p>
      </div>
    </div>

    <form class="question-bar" id="chatForm">
      <input type="text" id="messageInput" placeholder="Ask something about the document…" autocomplete="off" />
      <button type="submit" class="ask-btn">Ask</button>
    </form>
  </main>

  <!-- RIGHT: marginalia rail -->
  <aside class="marginalia" id="marginalia">
    <div class="marginalia-header">Sources consulted</div>
    <div class="marginalia-body" id="marginaliaBody">
      <p class="marginalia-empty">Passages the assistant drew on will appear here, annotated like margin notes.</p>
    </div>
  </aside>

</div>

<script src="script.js"></script>
</body>
</html>
